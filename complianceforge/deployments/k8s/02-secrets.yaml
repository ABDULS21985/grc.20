---
# ComplianceForge — Secrets (base64-encoded)
# IMPORTANT: Replace placeholder values before deploying.
# In production, use external secret management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: complianceforge-secrets
  namespace: complianceforge
  labels:
    app.kubernetes.io/name: complianceforge
type: Opaque
stringData:
  DB_USER: "complianceforge"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  REDIS_PASSWORD: ""
  JWT_SECRET: "CHANGE_ME_GENERATE_A_STRONG_256BIT_KEY"
  ENCRYPTION_KEY: "CHANGE_ME_32_BYTE_ENCRYPTION_KEY"
  SMTP_HOST: "smtp.example.com"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
