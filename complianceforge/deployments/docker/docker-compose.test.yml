version: "3.9"

# Test environment — isolated database for integration tests
# Usage: docker compose -f deployments/docker/docker-compose.test.yml up -d
#        make test
#        docker compose -f deployments/docker/docker-compose.test.yml down

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: complianceforge-db-test
    environment:
      POSTGRES_USER: complianceforge
      POSTGRES_PASSWORD: complianceforge
      POSTGRES_DB: complianceforge_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed for speed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complianceforge -d complianceforge_test"]
      interval: 2s
      timeout: 2s
      retries: 10

  redis-test:
    image: redis:7-alpine
    container_name: complianceforge-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 5
